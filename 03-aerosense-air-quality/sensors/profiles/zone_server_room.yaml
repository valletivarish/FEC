# Server rooms have near-zero occupancy but tighter thermal and gas tolerances.
zone_id: zone-server-room
sensors:
  co2:
    frequency_s: 15
    dispatch_rate: on_change
    min: 400
    max: 3000
    model: random_walk
    step: 15
  pm25:
    frequency_s: 30
    dispatch_rate: on_change
    min: 0
    max: 250
    model: random_walk
    step: 2
  pm10:
    frequency_s: 30
    dispatch_rate: on_change
    min: 0
    max: 350
    model: random_walk
    step: 3
  tvoc:
    frequency_s: 30
    dispatch_rate: on_change
    min: 0
    max: 2000
    model: random_walk
    step: 20
  hcho:
    frequency_s: 30
    dispatch_rate: on_change
    min: 0
    max: 500
    model: random_walk
    step: 5
  temperature:
    frequency_s: 30
    dispatch_rate: 60
    min: 14
    max: 32
    model: random_walk
    step: 0.2
  humidity:
    frequency_s: 30
    dispatch_rate: 60
    min: 15
    max: 85
    model: random_walk
    step: 1.0
  occupancy_pir:
    frequency_s: 2
    dispatch_rate: on_change
    min: 0
    max: 1
    model: flip
    flip_probability: 0.01
  co:
    frequency_s: 20
    dispatch_rate: on_change
    min: 0
    max: 50
    model: random_walk
    step: 0.3
  no2:
    frequency_s: 20
    dispatch_rate: on_change
    min: 0
    max: 200
    model: random_walk
    step: 1.5
