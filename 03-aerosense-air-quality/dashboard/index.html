<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroSense · Air Quality</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./src/styles/theme.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <aside class="app-sidebar d-flex flex-column flex-shrink-0 align-items-center p-2">
      <a href="#" class="sidebar-brand d-flex mb-4 text-decoration-none" data-tooltip="AeroSense &middot; Indoor Air Quality" title="AeroSense · Indoor Air Quality">
        <span class="brand-mark">A</span>
        <span class="visually-hidden">AeroSense · Indoor Air Quality</span>
      </a>
      <nav class="nav flex-column mb-auto" id="sidebar-nav">
        <button class="nav-link sidebar-link sidebar-link-active" data-route="ventboard" data-tooltip="VentBoard" type="button">
          <i class="bi bi-grid-1x2" aria-hidden="true"></i>
          <span class="visually-hidden">VentBoard</span>
        </button>
        <button class="nav-link sidebar-link" data-route="config" type="button" hidden></button>
      </nav>
      <button type="button" class="sidebar-info" data-tooltip="Select a zone to view its sensors and config." aria-label="Select a zone to view its sensors and config.">
        <i class="bi bi-info-circle" aria-hidden="true"></i>
      </button>
    </aside>

    <main class="app-main flex-grow-1">
      <header class="app-header d-flex flex-column px-4 py-3">
        <h1 class="page-title mb-0">Indoor Air Quality</h1>
        <span class="header-meta text-muted small">6 zones · 10 sensors · 3 fog nodes</span>
      </header>
      <div class="app-content p-4">
        <div id="view-ventboard" class="view"></div>
        <div id="view-zone-detail" class="view" hidden></div>
        <div id="view-zone-config" class="view" hidden></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
