<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusPulse Control Room</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="src/styles/campuspulse-theme.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <aside class="app-sidebar d-flex flex-column flex-shrink-0 p-3">
      <a href="#" class="sidebar-brand d-flex flex-column mb-4 text-decoration-none">
        <span class="brand-name">CampusPulse</span>
        <span class="brand-subtitle">Building Operations</span>
      </a>
      <nav class="nav flex-column mb-auto" id="sidebar-nav">
        <button class="nav-link sidebar-link sidebar-link-active" data-view="grid" type="button"><i class="bi bi-grid-1x2"></i> Zone Grid</button>
        <button class="nav-link sidebar-link" data-view="alerts" type="button"><i class="bi bi-bell"></i> Alert Feed <span id="alert-feed-count" class="sidebar-badge" hidden>0</span></button>
        <button class="nav-link sidebar-link" data-view="comfort" type="button" disabled><i class="bi bi-thermometer-half"></i> Comfort Panel</button>
        <button class="nav-link sidebar-link" data-view="energy" type="button" disabled><i class="bi bi-lightning-charge"></i> Energy Panel</button>
        <button class="nav-link sidebar-link" data-view="security" type="button" disabled><i class="bi bi-shield-check"></i> Security Timeline</button>
      </nav>
      <p class="sidebar-footnote small mb-0">Select a zone in the grid to unlock its panels.</p>
    </aside>

    <main class="app-main flex-grow-1">
      <header class="app-header d-flex align-items-center justify-content-between px-4 py-3">
        <h1 class="page-title mb-0">Building Operations</h1>
        <span class="header-meta text-muted small">10 zones monitored</span>
      </header>
      <div class="app-content p-4">
        <section id="view-grid" class="view"></section>

        <section id="zone-detail" class="view zone-detail" hidden>
          <h2 id="zone-detail-heading" class="panel-heading mb-3">Zone Detail</h2>
          <div id="comfort-panel" class="mb-3"></div>
          <div id="energy-panel" class="mb-3"></div>
          <div id="security-panel" class="mb-3"></div>
        </section>

        <section id="view-alerts" class="view" hidden></section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
