name: floodwatch-ci

on:
  push:
    paths:
      - '09-floodwatch-river-early-warning/**'
  pull_request:
    paths:
      - '09-floodwatch-river-early-warning/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: 09-floodwatch-river-early-warning

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Lint (checkstyle)
        run: |
          mvn -q install -N
          mvn -q -f river-gauge-sim/pom.xml checkstyle:check
          mvn -q -f fog-nodes/pom.xml checkstyle:check
          mvn -q -f backend/pom.xml checkstyle:check
          mvn -q -f infra/pom.xml checkstyle:check
          mvn -q -f integration-test/pom.xml checkstyle:check
      - name: Unit test (sensors, fog, backend)
        run: |
          mvn -q -f river-gauge-sim/pom.xml test
          mvn -q -f fog-nodes/pom.xml test
          mvn -q -f backend/pom.xml test
      - name: Install built modules to local repo (integration-test depends on them)
        run: |
          mvn -q -f river-gauge-sim/pom.xml install -DskipTests
          mvn -q -f fog-nodes/pom.xml install -DskipTests
          mvn -q -f backend/pom.xml install -DskipTests
      - name: Start local AWS emulator + MQTT broker
        run: docker compose -f ../docker-compose.yml up -d
      - name: Wait for emulator health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null && break
            sleep 2
          done
      - name: Integration test
        working-directory: 09-floodwatch-river-early-warning/integration-test
        run: mvn test
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_REGION: eu-west-1
          AWS_DEFAULT_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          FLOODWATCH_STAGE_TABLE: floodwatch-reach-stage
      - name: CDK synth (validates infra)
        working-directory: 09-floodwatch-river-early-warning/infra
        run: |
          mvn -q compile
          npx --yes aws-cdk@2 synth
      - name: Dashboard Playwright tests
        working-directory: 09-floodwatch-river-early-warning/dashboard
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run test:e2e

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: floodwatch-production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Package backend and deploy
        working-directory: 09-floodwatch-river-early-warning
        run: |
          mvn -q install -N
          mvn -q -f river-gauge-sim/pom.xml install -DskipTests
          mvn -q -f fog-nodes/pom.xml install -DskipTests
          mvn -q -f backend/pom.xml package -DskipTests
          cd infra && npx --yes aws-cdk@2 deploy --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
