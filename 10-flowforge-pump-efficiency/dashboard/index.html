<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlowForge — Pump Farm Efficiency</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./src/styles/flowforge-theme.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <aside class="app-sidebar d-flex flex-column flex-shrink-0 p-2">
      <a href="#" class="sidebar-brand d-flex flex-column align-items-center mb-3 text-decoration-none navbar-brand p-0 m-0" title="FlowForge — Pump Farm 01">
        <span class="brand-mark" aria-hidden="true">FF</span>
        <span class="visually-hidden">FlowForge — Pump Farm 01</span>
      </a>
      <nav class="nav flex-column mb-auto" id="sidebar-nav">
        <button class="sidebar-link sidebar-link-active" data-target="pump-health-container" type="button" title="Pump Health" aria-label="Pump Health">
          <i class="bi bi-activity"></i><span class="visually-hidden">Pump Health</span>
        </button>
        <button class="sidebar-link" data-target="hydraulic-efficiency-container" type="button" title="Hydraulic Efficiency" aria-label="Hydraulic Efficiency">
          <i class="bi bi-speedometer2"></i><span class="visually-hidden">Hydraulic Efficiency</span>
        </button>
        <button class="sidebar-link" data-target="seal-integrity-container" type="button" title="Seal Integrity" aria-label="Seal Integrity">
          <i class="bi bi-droplet"></i><span class="visually-hidden">Seal Integrity</span>
        </button>
        <button class="sidebar-link" data-target="insight-log-container" type="button" title="Insight Log" aria-label="Insight Log">
          <i class="bi bi-list-ul"></i><span class="visually-hidden">Insight Log</span>
        </button>
      </nav>
      <span class="sidebar-footnote-icon" title="FN1 Health · FN2 Hydraulics · FN3 Integrity" aria-label="FN1 Health, FN2 Hydraulics, FN3 Integrity">
        <i class="bi bi-info-circle"></i>
      </span>
    </aside>

    <main class="app-main flex-grow-1">
      <header class="app-header d-flex align-items-center justify-content-between px-4 py-3">
        <h1 class="page-title mb-0">Pump Farm Efficiency</h1>
        <span class="header-meta small" id="live-status">
          <span class="header-meta-pill header-meta-pill-live"><i class="bi bi-circle-fill ff-live-dot" style="font-size:0.55rem"></i> <span id="live-status-label">Live</span></span>
          <span class="header-meta-pill">3 pumps</span>
          <span class="header-meta-pill">10 sensors</span>
        </span>
      </header>
      <div class="app-content p-4">
        <div class="ff-acq-bar" id="acq-bar" data-testid="acq-bar">
          <span class="ff-acq-item" title="Whether the pump farm is currently within its scheduled data-collection window (OPEN) or that window has gone stale (STALE)">Acquisition window: <span id="acq-window-state">OPEN</span></span>
          <span class="ff-acq-sep">&middot;</span>
          <span class="ff-acq-item">Last downlink <span id="acq-last-downlink">00:00:00</span> ago</span>
          <span class="ff-acq-sep">&middot;</span>
          <span class="ff-acq-item">Next scheduled <span id="acq-next-downlink">00:00:00</span></span>
          <span class="ff-acq-sep">&middot;</span>
          <span class="ff-acq-item" title="Whether telemetry is arriving on schedule (NOMINAL) versus degraded or stopped (DEGRADED/NO SIGNAL)">Signal: <span id="acq-signal-state">NOMINAL</span></span>
        </div>

        <div id="kpi-row"></div>

        <div id="empty-state" class="alert alert-warning d-none" role="alert" data-testid="empty-state">
          No live data — start the local stack to see readings
        </div>

        <section class="mb-4">
          <div id="pump-health-container" data-testid="pump-health-container"></div>
        </section>

        <section class="mb-4">
          <div id="hydraulic-efficiency-container" data-testid="hydraulic-efficiency-container"></div>
        </section>

        <section class="mb-4">
          <div id="seal-integrity-container" data-testid="seal-integrity-container"></div>
        </section>

        <section class="mb-4">
          <div id="insight-log-container" data-testid="insight-log-container"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/acqBar.js"></script>
</body>
</html>
