<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GreenhouseGuard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./src/styles/greenhouseguard-theme.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <aside class="app-sidebar d-flex flex-column flex-shrink-0 p-3">
      <a href="#" class="sidebar-brand d-flex flex-column mb-4 text-decoration-none">
        <span class="brand-name">GreenhouseGuard</span>
        <span class="brand-subtitle">Greenhouse Climate Ops</span>
      </a>
      <div class="sidebar-zone-strip d-flex flex-wrap mb-1" id="sidebar-zone-strip" aria-label="Zone status">
        <span class="sidebar-zone-chip" data-zone-chip="zone-a"><span class="sidebar-zone-dot"></span>zone-a</span>
        <span class="sidebar-zone-chip" data-zone-chip="zone-b"><span class="sidebar-zone-dot"></span>zone-b</span>
        <span class="sidebar-zone-chip" data-zone-chip="zone-c"><span class="sidebar-zone-dot"></span>zone-c</span>
      </div>
      <p class="sidebar-zone-legend small mb-3">
        <span class="sidebar-zone-dot gg-zone-nominal"></span> nominal &nbsp;
        <span class="sidebar-zone-dot gg-zone-fault"></span> active fault
      </p>
      <nav class="nav flex-column mb-auto" aria-label="Primary">
        <button class="nav-link sidebar-link sidebar-link-active" type="button"><i class="bi bi-flower1"></i> Bench Overview</button>
        <button class="nav-link sidebar-link" type="button"><i class="bi bi-droplet"></i> Fertigation</button>
        <button class="nav-link sidebar-link" type="button" title="DLI: Daily Light Integral -- total light a plant receives over a day; a shortfall means it is below the target for healthy growth"><i class="bi bi-exclamation-triangle"></i> Faults &amp; DLI</button>
      </nav>
      <p class="sidebar-footnote small mb-0">Zones zone-a, zone-b and zone-c report through three fog nodes.</p>
    </aside>

    <main class="app-main flex-grow-1">
      <header class="app-header d-flex align-items-center justify-content-between px-4 py-3">
        <h1 class="page-title mb-0">Greenhouse Climate Ops</h1>
        <span class="header-vpd-pill" id="header-vpd" title="Vapor Pressure Deficit -- how much drying power the air has; too low risks fungal disease, too high stresses plants">Peak VPD &ndash;</span>
      </header>
      <div class="app-content p-4">
        <div id="kpi-row"></div>

        <section class="mb-4">
          <h2 class="section-title">Bench Overview &mdash; ClimateFog &amp; EnclosureFog</h2>
          <div id="bench-overview-panel"></div>
        </section>

        <section class="mb-4">
          <h2 class="section-title">Fertigation &mdash; FertigationFog</h2>
          <div class="card">
            <div id="fertigation-table-container" class="table-responsive"></div>
          </div>
        </section>

        <section class="mb-4">
          <h2 class="section-title">Faults &amp; DLI Log</h2>
          <div class="card">
            <div id="faults-log-container" class="table-responsive"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
