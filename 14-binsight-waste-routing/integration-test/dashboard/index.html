<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarborPulse — Fleet Console</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="src/styles/harborpulse-theme.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-hp-navy" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <span class="brand-monogram">HP</span>
        <span>HarborPulse</span>
      </a>
      <span class="navbar-text small text-brass">Fleet & Sea-State Console</span>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <section class="mb-5">
      <h2 class="section-header">Fleet Overview</h2>
      <div id="fleet-empty-note" class="alert alert-secondary empty-state-note d-none" role="status"></div>
      <div class="d-flex flex-wrap align-items-start gap-3">
        <canvas id="fleet-radar-canvas" width="360" height="360" class="border border-secondary-subtle rounded"></canvas>
        <div id="fleet-radar-legend" class="radar-legend"></div>
      </div>
    </section>

    <section class="mb-5">
      <h2 class="section-header">Engine Health</h2>
      <div class="card">
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Vessel</th>
                <th>RPM</th>
                <th>Coolant &deg;C</th>
                <th>Oil kPa</th>
                <th>Fuel L/h</th>
                <th>Bearing Wear Energy</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="engine-health-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="mb-5">
      <h2 class="section-header">Sea State</h2>
      <div class="card">
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Vessel</th>
                <th>Sea State</th>
                <th>Roll Amplitude &deg;</th>
                <th>Roll Period Est.</th>
                <th>Wind kn</th>
              </tr>
            </thead>
            <tbody id="sea-state-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="mb-5">
      <h2 class="section-header">Safety & Alarms</h2>
      <div class="card">
        <div class="table-responsive">
          <table class="table table-dark table-striped table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Vessel</th>
                <th>Alarm Status</th>
                <th>Lat</th>
                <th>Lon</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody id="safety-alarms-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
