<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainFrost — Cold Chain Operations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="src/styles/frostboard.css" />
</head>
<body>
  <div class="app-shell d-flex">
    <aside class="app-sidebar d-flex flex-column flex-shrink-0 p-3">
      <a href="#" class="sidebar-brand d-flex flex-column mb-4 text-decoration-none">
        <span class="brand-name">ChainFrost</span>
        <span class="brand-subtitle">Cold Chain Operations</span>
      </a>
      <nav class="nav flex-column mb-auto stepper-nav" data-testid="topnav">
        <button class="nav-link sidebar-link is-active" data-view="fleet" type="button">
          <span class="step-badge">1</span>
          <i class="bi bi-truck"></i> Fleet Manifest
        </button>
        <button class="nav-link sidebar-link" data-view="lane" type="button" disabled>
          <span class="step-badge">2</span>
          <i class="bi bi-thermometer-snow"></i> Shipment Lane
        </button>
        <button class="nav-link sidebar-link" data-view="ledger" type="button" disabled>
          <span class="step-badge">3</span>
          <i class="bi bi-clipboard-data"></i> Excursion Ledger
        </button>
      </nav>
      <p class="sidebar-footnote small mb-0">Select a shipment in the manifest to unlock its lane.</p>
    </aside>

    <main class="app-main flex-grow-1">
      <header class="app-header d-flex align-items-center justify-content-between px-4 py-3">
        <h1 class="page-title mb-0">Cold Chain Operations</h1>
        <div class="header-meta text-muted small" data-testid="console-status">
          <span class="console-clock" data-testid="console-clock">--:--:--Z</span>
          <span class="fleet-status" data-testid="console-fleet-status" data-severity="OK">Fleet: nominal</span>
        </div>
      </header>
      <div class="app-content p-4">
        <section id="fleet-view" class="view" data-testid="fleet-view"></section>
        <section id="lane-view" class="view d-none" data-testid="lane-view"></section>
        <section id="ledger-view" class="view d-none" data-testid="ledger-view"></section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
