name: officeiq-ci

on:
  push:
    paths:
      - '08-officeiq-smart-office-comfort/**'
  pull_request:
    paths:
      - '08-officeiq-smart-office-comfort/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: 08-officeiq-smart-office-comfort

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint
        run: |
          npm install
          npm install --prefix sensors && npm run lint --prefix sensors
          npm install --prefix fog && npm run lint --prefix fog
          npm install --prefix backend && npm run lint --prefix backend
          npm install --prefix integration-test && npm run lint --prefix integration-test
          npm install --prefix dashboard && npm run lint --prefix dashboard
      - name: Unit test (sensors, fog, backend)
        run: |
          npm install --prefix sensors && npm test --prefix sensors
          npm install --prefix fog && npm test --prefix fog
          npm install --prefix backend && npm test --prefix backend
      - name: Start local AWS emulator + MQTT broker
        run: docker compose -f ../docker-compose.yml up -d
      - name: Wait for emulator health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null && break
            sleep 2
          done
      - name: Integration test
        working-directory: 08-officeiq-smart-office-comfort/integration-test
        run: |
          npm install
          npx jest
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_REGION: eu-west-1
          AWS_DEFAULT_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          OFFICEIQ_READINGS_TABLE: OfficeIQReadings
      - name: CDK synth (validates infra, incl. Fargate autoscaling)
        working-directory: 08-officeiq-smart-office-comfort/infra
        run: |
          npm install
          npx tsc --noEmit
          npx --yes aws-cdk@2 synth
      - name: Dashboard Playwright tests
        working-directory: 08-officeiq-smart-office-comfort/dashboard
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run test:e2e

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: officeiq-production
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy to AWS
        working-directory: 08-officeiq-smart-office-comfort/infra
        run: |
          npm install
          npx --yes aws-cdk@2 deploy --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
